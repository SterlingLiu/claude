version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: lostfound-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-lostfound}
      MYSQL_USER: ${DB_USER:-lostfound}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lostfound123}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lostfound-net

  # Backend API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lostfound-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-lostfound}
      DB_PASSWORD: ${DB_PASSWORD:-lostfound123}
      DB_NAME: ${DB_NAME:-lostfound}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - lostfound-net

  # Frontend (Nginx)
  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: lostfound-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - lostfound-net

volumes:
  mysql_data:

networks:
  lostfound-net:
    driver: bridge
